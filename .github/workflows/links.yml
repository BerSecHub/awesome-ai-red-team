name: Links

on:
  push:
    branches: [main]
    paths: ['**.md']
  pull_request:
    paths: ['**.md']
  schedule:
    - cron: '27 6 * * 1'   # Mondays 06:27 UTC — off-peak
  workflow_dispatch:

permissions:
  issues: write

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose --no-progress --max-concurrency 4
            --exclude-mail
            './**/*.md'
          fail: false            # informational — never block on a flaky host
          output: ./lychee/out.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # avoids GitHub rate-limits

      - name: Open issue on scheduled failure
        if: steps.lychee.outputs.exit_code != 0 && github.event_name == 'schedule'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 🔗 Link check found dead links
          content-filepath: ./lychee/out.md
          labels: link-rot, automated
